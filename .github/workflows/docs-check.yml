name: Docs Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TASKSAIL_AGENT_REGISTRY_PATH: .github/agents/registry.json

jobs:
  markdown-quality:
    name: Markdown Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2

  docs-and-contract-lane:
    name: Docs and Contract Lane
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Validate repository markdown links
        run: pnpm exec tsx ./src/backend/platform/core/pythonCli.ts ./src/backend/scripts/python/validate-docs.py

      - name: Validate handoff templates
        run: pnpm exec tsx ./src/backend/platform/workflow-policy/cli.ts --mode lint --format text

      - name: Run docs and contract lane
        run: pnpm exec tsx ./src/backend/platform/core/pythonCli.ts ./src/backend/scripts/python/run-targeted-tests.py --manifest ./tests/test_manifest.json --lane contracts
