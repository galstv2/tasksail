name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TASKSAIL_AGENT_REGISTRY_PATH: .github/agents/registry.json

jobs:
  repository-structure:
    name: Repository Structure
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Validate required repository structure
        run: pnpm run validate

  file-size-limits:
    name: File Size Limits
    runs-on: ubuntu-latest
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Check file sizes against limits
        run: pnpm run check-sizes

  python-smoke-lane:
    name: Python Smoke Lane
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff lint
        run: ruff check .

      - name: Run representative Python unit lane
        run: python -m pytest tests/domains/pack_writer tests/domains/pack_preflight tests/domains/qmd/test_stub_scope.py -q

  backend-node-lane:
    name: Backend Node Lane
    runs-on: ubuntu-latest
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript type check
        run: pnpm run lint

      - name: Run backend platform tests
        run: pnpm run test -- --reporter=dot

      - name: Run smoke lane and workflow policy validation
        run: pnpm run test:smoke

  desktop-validation-lane:
    name: Desktop Validation Lane
    runs-on: ubuntu-latest
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install desktop dependencies
        working-directory: src/frontend/desktop
        run: npm ci

      - name: Audit desktop dependencies (fail on high/critical)
        working-directory: src/frontend/desktop
        run: npm audit --audit-level=high

      - name: Run CSS color token discipline gate
        working-directory: src/frontend/desktop
        run: npm run test:css-colors

      - name: Desktop TypeScript type check
        working-directory: src/frontend/desktop
        run: npm run lint

      - name: Run desktop tests
        working-directory: src/frontend/desktop
        run: npm test -- --reporter=dot

      - name: Build desktop shell
        working-directory: src/frontend/desktop
        run: npm run build

  changed-domain-lane:
    name: Changed Domain Lane
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run manifest-targeted domain lane for changed files
        run: pnpm exec tsx src/backend/platform/validation/changedDomainFiles.ts --base-sha "${{ github.event.pull_request.base.sha }}" --head-sha "${{ github.sha }}" --manifest ./tests/test_manifest.json

  comment-discipline:
    name: Comment Discipline
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - repository-structure
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run changed-line comment discipline
        run: >-
          pnpm run check-comments -- --mode changed
          --base-ref "${{ github.event.pull_request.base.sha }}"
          --head-ref "${{ github.sha }}"
